<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Music Search - Standalone Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      margin: 0 0 20px 0;
      font-size: 32px;
      text-align: center;
      color: #333;
    }
    .search-box {
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      padding: 15px;
      background: #fee;
      border: 1px solid #f88;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #c33;
    }
    .success {
      padding: 15px;
      background: #efe;
      border: 1px solid #8f8;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #383;
    }
    .results {
      margin-top: 20px;
    }
    .song-card {
      padding: 15px;
      margin-bottom: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .song-card:hover {
      transform: translateX(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .song-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 5px;
      color: #333;
    }
    .song-artist {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }
    .song-meta {
      font-size: 12px;
      color: #999;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      background: #667eea;
      color: white;
      border-radius: 12px;
      font-size: 11px;
      margin-right: 5px;
    }
    .debug {
      margin-top: 30px;
      padding: 15px;
      background: #e8f5e9;
      border-radius: 8px;
      font-size: 14px;
    }
    .debug h3 {
      margin-top: 0;
      color: #2e7d32;
    }
    .examples {
      margin-top: 10px;
    }
    .example-btn {
      padding: 6px 12px;
      margin: 4px;
      font-size: 13px;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
    }
    .example-btn:hover {
      background: #e0e0e0;
    }
    .loading {
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 AI Music Search</h1>
    <p style="text-align: center; color: #666; margin-bottom: 20px;">
      Standalone test page - No Next.js, No Hydration Issues
    </p>

    <div class="search-box">
      <input
        type="text"
        id="queryInput"
        placeholder="e.g., chill vibes for coding"
        value="chill vibes for coding"
      />
      <button id="searchBtn" onclick="handleSearch()">
        🔍 Search
      </button>

      <div class="examples">
        <span style="color: #666; font-size: 14px;">Try:</span>
        <button class="example-btn" onclick="setQuery('chill vibes for coding')">chill vibes</button>
        <button class="example-btn" onclick="setQuery('nhạc K-pop tập gym')">K-pop gym</button>
        <button class="example-btn" onclick="setQuery('upbeat workout music')">workout</button>
      </div>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <div class="debug">
      <h3>🔍 Debug Info</h3>
      <p><strong>Backend:</strong> http://localhost:8899</p>
      <p><strong>Endpoint:</strong> POST /api/music/ai-search</p>
      <p><strong>Status:</strong> <span id="backendStatus">Checking...</span></p>
      <p style="margin-top: 10px; font-size: 12px; color: #666;">
        Open Browser Console (F12) to see detailed logs
      </p>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:8899';

    function setQuery(query) {
      document.getElementById('queryInput').value = query;
    }

    async function handleSearch() {
      const query = document.getElementById('queryInput').value.trim();
      if (!query) return;

      const btn = document.getElementById('searchBtn');
      const statusDiv = document.getElementById('status');
      const resultsDiv = document.getElementById('results');

      // Reset
      statusDiv.innerHTML = '';
      resultsDiv.innerHTML = '';

      // Show loading
      btn.disabled = true;
      btn.innerHTML = '<span class="loading">⏳</span> Searching...';

      console.log('🔍 Searching for:', query);

      try {
        const startTime = Date.now();

        const response = await fetch(`${BACKEND_URL}/api/music/ai-search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, language: 'en', limit: 10 })
        });

        const elapsed = Date.now() - startTime;

        console.log('📡 Response status:', response.status);
        console.log('⏱️ Response time:', elapsed, 'ms');

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        console.log('📦 Response data:', data);
        console.log('🤖 AI Parsed Query:', data.parsed_query);

        // Show success
        statusDiv.innerHTML = `
          <div class="success">
            ✅ Found ${data.songs?.length || 0} songs in ${elapsed}ms
            <br><small>AI detected: ${JSON.stringify(data.parsed_query || {})}</small>
          </div>
        `;

        // Show results
        if (data.songs && data.songs.length > 0) {
          resultsDiv.innerHTML = '<div class="results">' +
            data.songs.map((song, i) => `
              <div class="song-card">
                <div class="song-title">${i + 1}. ${song.title}</div>
                <div class="song-artist">👤 ${song.artist}</div>
                <div class="song-meta">
                  <span class="badge">${song.source}</span>
                  ${song.duration ? `⏱️ ${formatDuration(song.duration)}` : ''}
                </div>
              </div>
            `).join('') +
          '</div>';
        } else {
          resultsDiv.innerHTML = '<p style="text-align: center; color: #999;">No songs found</p>';
        }

      } catch (error) {
        console.error('❌ Search error:', error);
        statusDiv.innerHTML = `
          <div class="error">
            <strong>Error:</strong> ${error.message}
            <br><small>Check browser console (F12) for details</small>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔍 Search';
      }
    }

    function formatDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    async function checkBackend() {
      const statusEl = document.getElementById('backendStatus');
      try {
        const response = await fetch(`${BACKEND_URL}/api/music/ai-health`);
        if (response.ok) {
          const data = await response.json();
          statusEl.innerHTML = `<span style="color: green">✅ Connected</span>`;
          console.log('✅ Backend healthy:', data);
        } else {
          statusEl.innerHTML = `<span style="color: red">❌ Error</span>`;
        }
      } catch (error) {
        statusEl.innerHTML = `<span style="color: red">❌ Disconnected</span>`;
        console.error('❌ Backend check failed:', error);
      }
    }

    // Check backend on load
    checkBackend();

    // Allow Enter key to search
    document.getElementById('queryInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSearch();
    });
  </script>
</body>
</html>
