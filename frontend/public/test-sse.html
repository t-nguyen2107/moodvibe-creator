<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #log { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .log-entry { padding: 5px; border-bottom: 1px solid #ddd; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🎵 SSE Connection Test</h1>

    <div>
        <input type="text" id="query" value="nhac viet hot" style="padding: 10px; width: 300px;" />
        <button onclick="startSSE()">Start SSE Test</button>
    </div>

    <div id="status"></div>

    <div id="log"></div>

    <script>
        function startSSE() {
            const query = document.getElementById('query').value;
            const statusDiv = document.getElementById('status');
            const logDiv = document.getElementById('log');

            statusDiv.innerHTML = '<p style="color: blue;">⏳ Connecting to SSE...</p>';
            logDiv.innerHTML = '';

            const eventSource = new EventSource(
                `http://localhost:8899/api/music/ai-search/stream?query=${encodeURIComponent(query)}&sources=youtube,soundcloud&limit=5`
            );

            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('Progress:', data);

                    const logEntry = document.createElement('div');
                    logEntry.className = 'log-entry';
                    logEntry.innerHTML = `
                        <strong>${data.step}</strong>: ${data.message} (${data.progress}%)
                        ${data.source ? `<br><small>Source: ${data.source}</small>` : ''}
                    `;
                    logDiv.appendChild(logEntry);

                    // Auto scroll to bottom
                    logDiv.scrollTop = logDiv.scrollHeight;

                    if (data.step === 'complete') {
                        statusDiv.innerHTML = `<p style="color: green;">✅ Complete! Found ${data.total} songs</p>`;
                        eventSource.close();
                    }

                    if (data.step === 'error') {
                        statusDiv.innerHTML = `<p style="color: red;">❌ Error: ${data.message}</p>`;
                        eventSource.close();
                    }
                } catch (error) {
                    console.error('Parse error:', error);
                }
            };

            eventSource.onerror = (error) => {
                console.error('SSE error:', error);
                statusDiv.innerHTML = `<p style="color: red;">❌ SSE Error: Check console for details</p>`;
                eventSource.close();
            };

            // Close after 30 seconds if not complete
            setTimeout(() => {
                if (eventSource.readyState !== 2) {
                    statusDiv.innerHTML = '<p style="color: orange;">⚠️ Timeout after 30 seconds</p>';
                    eventSource.close();
                }
            }, 30000);
        }
    </script>
</body>
</html>
